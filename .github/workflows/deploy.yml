name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Gleam
        run: |
          curl -fsSL https://gleam.run/install.sh | sh
          echo "$HOME/.gleam/bin" >> $GITHUB_PATH

      - name: Build project
        run: gleam run -m lustre/dev build --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
