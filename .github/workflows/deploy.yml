name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Gleam
        run: |
          wget https://github.com/gleam-lang/gleam/releases/download/v1.16.0/gleam-v1.16.0-x86_64-unknown-linux-musl.tar.gz
          tar xf gleam-v1.16.0-x86_64-unknown-linux-musl.tar.gz
          chmod +x gleam
          mkdir -p ~/.local/bin
          mv gleam ~/.local/bin/

      - name: Add Gleam to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build project
        run: gleam run -m lustre/dev build --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
